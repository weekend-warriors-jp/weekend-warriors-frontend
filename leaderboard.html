<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b1a0b">
  <title>リーダーボード — Weekend Warriors</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark">🏌️</span>
        <div>
          <span class="logo-name">Weekend Warriors</span>
          <span class="logo-sub">Golf Community</span>
        </div>
      </a>
      <a id="back-btn" href="index.html" class="back-btn">← イベントへ</a>
    </div>
  </header>

  <main class="main">
    <div id="loading" class="loading-box">
      <div class="spinner"></div>
      <span>読み込み中…</span>
    </div>

    <div id="error" class="error-box hidden"></div>

    <div id="container" class="hidden">
      <div class="actions">
        <h1 class="page-title" id="event-name" style="margin-bottom:0"></h1>
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="net"   onclick="switchMode('net')">ネット</button>
          <button class="mode-tab"        data-mode="gross" onclick="switchMode('gross')">グロス</button>
        </div>
        <button id="refresh-btn" class="btn btn-outline btn-sm" onclick="refresh()">
          🔄 更新
        </button>
        <span id="updated-at" class="updated-at"></span>
      </div>

      <div class="panel">
        <p class="section-label">🏆 リーダーボード（新ペリア方式）</p>
        <div class="table-scroll">
          <table class="lb-table">
            <thead>
              <tr>
                <th>順位</th>
                <th>選手名</th>
                <th id="th-gross">グロス</th>
                <th>ハンデ</th>
                <th id="th-net" class="th-active">ネット</th>
              </tr>
            </thead>
            <tbody id="lb-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/leaderboard.js"></script>
</body>
</html>
